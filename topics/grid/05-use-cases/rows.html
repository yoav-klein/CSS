<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
}

.box {
    border: none;
    background-color: aqua;
    display: grid;
    width: 600px;
    grid-template-columns: 1fr 1fr 1fr;
    
    height: 600px;
    grid-auto-rows: minmax(100px, auto);
    align-content: start;
    
}

.item {
    border: 1px dashed red;
}


</style>
</head>
<body>
    <div class="box"> 
        <div class="item">Lorem ipsum dolor sit amet consectetur adipisicing elit. Nihil explicabo eius hic dolis assumenda eos? Molestias corrupti numquam placeat nobis?</div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        
    </div>
</body>
</html>
